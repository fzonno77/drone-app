<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DJI Mini 5 Pro - Solar Pro v102</title>
    <style>
        :root { --bg: #000000; --card: #121212; --accent: #ffff00; --text: #ffffff; --smart: #00f2ff; --warn: #ffab70; --target: #38bdf8; }
        html, body { touch-action: manipulation; font-family: "Arial Black", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        /* ALTO CONTRASTO SOLAR EDITION */
        .hero-info { text-align: center; padding: 25px; background: #1a1a1a; border-radius: 25px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .hero-time { font-size: 3.5rem; font-weight: 900; color: var(--accent); }

        .sensor-panel { background: #111; border: 2px solid var(--smart); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .sensor-status { font-size: 0.8rem; color: var(--smart); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }

        .btn { display: block; width: 100%; padding: 22px; margin: 12px 0; background: var(--card); border: 2px solid #333; border-radius: 18px; color: #fff; font-size: 1.1rem; font-weight: bold; text-align: left; cursor: pointer; }
        .btn-smart { border: 3px solid var(--smart) !important; background: rgba(0, 242, 255, 0.1) !important; position: relative; }
        .btn-smart::after { content: "CONSIGLIATO"; position: absolute; top: -10px; right: 10px; background: var(--smart); color: #000; font-size: 0.6rem; padding: 2px 8px; border-radius: 5px; }

        .card { background: #1a1a1a; padding: 20px; border-radius: 20px; margin-top: 15px; border: 2px solid var(--accent); }
        .val { color: var(--accent); font-weight: 900; font-size: 1.6rem; }
        .instruction-box { margin-top: 15px; padding: 15px; background: #000; border-radius: 12px; border: 1px solid #444; color: #fff; font-size: 1.1rem; }
        
        .screen { display: none; }
        .active { display: block !important; }
        
        .tara-btn { background: #222; border: 1px dashed var(--accent); color: var(--accent); font-size: 0.7rem; padding: 8px; border-radius: 10px; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="hero-info">
    <div id="hero-time" class="hero-time">00:00</div>
    <div id="status-display" style="font-size: 0.9rem; color: #aaa;">PRONTO AL DECOLLO</div>
</div>

<div id="app" style="max-width: 500px; margin: 0 auto;">
    
    <div class="sensor-panel">
        <div class="sensor-status" id="sensor-log">🛰️ SENSORI DISCONNESSI</div>
        <div style="display: flex; gap: 10px;">
            <label class="btn" style="margin:0; padding:15px; font-size:0.8rem; flex:2; text-align:center; border-color: var(--smart); background: #000;">
                📸 ANALISI AMBIENTE
                <input type="file" accept="image/*" capture="environment" style="display:none" onchange="analyzePhoto(event)">
            </label>
            <button onclick="calibrateSole()" class="tara-btn" style="flex:1;">TARATURA<br>SOLE</button>
        </div>
    </div>

    <!-- Schermate principali (Mantengo la tua struttura ma con grafica Solar) -->
    <div id="screen-env" class="screen active">
        <h2 style="color:var(--accent)">1. LUCE ATTUALE</h2>
        <button class="btn" id="btn-sole" onclick="setStep('env', 'Sole Forte', 'screen-goal')">☀️ SOLE PIENO</button>
        <button class="btn" id="btn-alba" onclick="setStep('env', 'Alba/Tramonto', 'screen-goal')">🌅 ALBA / TRAMONTO</button>
        <button class="btn" id="btn-nuvoloso" onclick="setStep('env', 'Nuvoloso', 'screen-goal')">☁️ NUVOLOSO / OMBRA</button>
    </div>

    <div id="screen-goal" class="screen">
        <h2 style="color:var(--accent)">2. OBIETTIVO</h2>
        <button class="btn" id="goal-cinema" onclick="setStep('goal', 'Cinema', 'screen-fps')">🎬 CINEMA (Sfocato)</button>
        <button class="btn" id="goal-sport" onclick="setStep('goal', 'Sport', 'screen-fps')">🏎️ SPORT (Nitido)</button>
    </div>

    <div id="screen-fps" class="screen">
        <h2 style="color:var(--accent)">3. FRAME RATE</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
            <button class="btn" style="text-align:center" onclick="setStep('fps', '24', 'screen-res')">24</button>
            <button class="btn" style="text-align:center" onclick="setStep('fps', '25', 'screen-res')">25</button>
            <button class="btn" style="text-align:center" onclick="setStep('fps', '30', 'screen-res')">30</button>
        </div>
    </div>

    <div id="screen-res" class="screen">
        <div id="result"></div>
        <button class="btn" style="background: var(--accent); color: #000; text-align: center;" onclick="location.reload()">🔄 NUOVA ANALISI</button>
    </div>
</div>

<canvas id="calc" style="display:none;"></canvas>

<script>
    let state = { soleRef: localStorage.getItem('soleRef') || 100 };
    let lastBrightness = 0;
    let lastWB = "5500K";

    function updateTime() {
        document.getElementById('hero-time').innerText = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    }
    setInterval(updateTime, 1000); updateTime();

    function analyzePhoto(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('calc');
                const ctx = canvas.getContext('2d');
                canvas.width = 10; canvas.height = 10;
                ctx.drawImage(img, 0, 0, 10, 10);
                const data = ctx.getImageData(0,0,10,10).data;
                
                let r=0, g=0, b=0;
                for(let i=0; i<data.length; i+=4) { r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
                
                lastBrightness = (r+g+b) / (data.length / 4 * 3);
                let ratio = (r/ (data.length/4)) / (b/ (data.length/4));
                
                // ANALISI COLORE (WB)
                if(ratio > 1.25) lastWB = "3500K - 4500K (Caldo)";
                else if(ratio < 0.85) lastWB = "6500K - 7500K (Freddo)";
                else lastWB = "5500K (Neutro)";

                document.getElementById('sensor-log').innerHTML = `💡 LUX: ${Math.round(lastBrightness)} | WB: ${lastWB}`;
                autoSelect();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function calibrateSole() {
        if(lastBrightness > 10) {
            localStorage.setItem('soleRef', lastBrightness);
            state.soleRef = lastBrightness;
            alert("TARATURA OK! Sole impostato a: " + Math.round(lastBrightness));
        } else {
            alert("Foto troppo scura per tarare il sole!");
        }
    }

    function autoSelect() {
        document.querySelectorAll('.btn-smart').forEach(b => b.classList.remove('btn-smart'));
        let ref = state.soleRef;
        
        if(lastBrightness > ref * 0.8) applySmart('btn-sole');
        else if(lastBrightness > ref * 0.3) applySmart('btn-nuvoloso');
        else applySmart('btn-alba');
    }

    function applySmart(id) { document.getElementById(id).classList.add('btn-smart'); }

    function setStep(k, v, next) {
        state[k] = v;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(next).classList.add('active');
        if(next === 'screen-res') render();
    }

    function render() {
        let nd = "ND32";
        if(state.env === 'Sole Forte') nd = (state.goal === 'Cinema') ? "ND64/128" : "ND32/64";
        
        document.getElementById('result').innerHTML = `
            <div class="card">
                <span style="font-size:0.7rem; color:var(--smart)">HARDWARE</span><br>
                💎 FILTRO: <span class="val">${nd}</span>
            </div>
            <div class="card">
                <span style="font-size:0.7rem; color:var(--smart)">CAMERA SETTING</span><br>
                WB: <span class="val">${lastWB}</span><br>
                OTTURATORE: <span class="val">1/${state.fps * 2}s</span>
            </div>
            <div class="instruction-box">
                <b>INFO VOLO:</b><br>
                Esposizione Target: <b>MM -0.3</b><br>
                Se MM è positivo, aumenta ND.<br>
                Se MM è negativo, aumenta ISO.
            </div>
        `;
    }
</script>
</body>
</html>
