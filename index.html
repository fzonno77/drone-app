<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DJI Mini 5 Pro Smart App</title>
    <!-- Configurazione per farla sembrare un'app reale -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #0b0e14; --card: #1c2128; --accent: #deff9a; --smart: #00f2ff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        .app-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-btn { width: 100%; padding: 22px; margin: 12px 0; background: #2d333b; border: 1px solid #444; border-radius: 20px; color: #fff; font-size: 1.1rem; font-weight: 600; text-align: left; position: relative; transition: 0.2s; }
        
        .smart-active { border: 3px solid var(--smart) !important; background: rgba(0, 242, 255, 0.05) !important; }
        .smart-tag { position: absolute; top: -12px; right: 20px; background: var(--smart); color: #000; font-size: 0.75rem; font-weight: 800; padding: 5px 12px; border-radius: 12px; text-transform: uppercase; }

        .status-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 15px; font-size: 0.85rem; }
        .pulse { width: 10px; height: 10px; background: var(--smart); border-radius: 50%; box-shadow: 0 0 10px var(--smart); animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
        
        .screen { display: none; }
        .active { display: block; }
        .res-val { color: var(--accent); font-size: 1.4rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="status-bar">
        <div class="pulse"></div>
        <span id="loc-text">GPS pronto per Bitritto...</span>
    </div>

    <button class="main-btn" onclick="startGPS()" style="background:var(--smart); color:#000; text-align:center;">
        🛰️ LOCALIZZA E ANALIZZA ORA
    </button>

    <div id="screen-env" class="active" style="margin-top:20px;">
        <h4 style="color:#8b949e; margin-bottom:10px;">AMBIENTE</h4>
        <button class="main-btn" id="opt-sole" onclick="setEnv(55000)">☀️ Sole Pieno</button>
        <button class="main-btn" id="opt-velato" onclick="setEnv(18000)">⛅ Sole Velato</button>
        <button class="main-btn" id="opt-nuvole" onclick="setEnv(6000)">☁️ Nuvoloso / Ombra</button>
        <button class="main-btn" id="opt-tramonto" onclick="setEnv(1500)">🌅 Alba / Tramonto</button>
    </div>

    <div id="screen-res" class="screen">
        <h4 style="color:var(--smart)">SETUP CONSIGLIATO</h4>
        <div id="result" style="background:#000; padding:20px; border-radius:20px; border:1px solid var(--accent); line-height:1.6;"></div>
        
        <div style="margin-top:20px; font-size:0.9rem; color:#8b949e;">
            <p>🎯 <b>Target MM:</b> Mantieni tra 0.0 e -0.3</p>
            <p>🔒 <b>AE LOCK:</b> Attiva dopo aver impostato i filtri.</p>
        </div>
        
        <button class="main-btn" onclick="location.reload()" style="text-align:center; margin-top:20px;">🔄 Nuova Analisi</button>
    </div>
</div>

<script>
    let currentLux = 0;

    function startGPS() {
        document.getElementById('loc-text').innerText = "Acquisizione posizione in corso...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    document.getElementById('loc-text').innerText = "Posizione acquisita: Bitritto OK";
                    const h = new Date().getHours();
                    // Simulazione smart detection basata su ora e posizione
                    const lux = (h > 8 && h < 18) ? 55000 : 2000;
                    applySmart(lux);
                },
                (err) => {
                    document.getElementById('loc-text').innerText = "Errore: Usa il file via HTTPS o carica su Drive.";
                    alert("Per usare il GPS, il file deve essere caricato online o su Google Drive.");
                },
                { enableHighAccuracy: true }
            );
        }
    }

    function applySmart(lux) {
        currentLux = lux;
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('smart-active'));
        let id = (lux > 35000) ? 'opt-sole' : (lux > 12000) ? 'opt-velato' : (lux > 3000) ? 'opt-nuvole' : 'opt-tramonto';
        const target = document.getElementById(id);
        target.classList.add('smart-active');
        const tag = document.createElement('div');
        tag.className = 'smart-tag'; tag.innerText = 'CONSIGLIATO SMART';
        target.appendChild(tag);
    }

    function setEnv(lux) {
        if(!currentLux) currentLux = lux;
        document.getElementById('screen-env').classList.remove('active');
        document.getElementById('screen-res').classList.add('active');
        render();
    }

    function render() {
        let nd = (currentLux > 35000) ? "ND64 / ND128" : (currentLux > 12000) ? "ND32" : "ND16";
        document.getElementById('result').innerHTML = `
            FILTRO: <span class="res-val">${nd}</span><br>
            SHUTTER: <span class="res-val">1/50</span> (o 1/120)<br>
            ISO: <span class="res-val">100</span> | WB: <span class="res-val">5500K</span>
        `;
    }
</script>
</body>
</html>
