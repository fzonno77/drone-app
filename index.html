<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DJI Mini 5 Pro - Pro Setup v112</title>
    <style>
        :root { --bg: #05070b; --card: #161b22; --accent: #deff9a; --text: #f0f6fc; --warn: #ffab70; --target: #38bdf8; --smart: #00f2ff; --action: #c084fc; }
        html, body { touch-action: manipulation; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        
        .hero-info { text-align: center; margin: 10px 0 25px 0; padding: 30px 15px; background: linear-gradient(180deg, rgba(222, 255, 154, 0.1) 0%, rgba(5, 7, 11, 0) 100%); border-radius: 32px; border: 1px solid rgba(255,255,255,0.05); }
        .hero-main { display: flex; flex-direction: column; align-items: center; line-height: 1.1; }
        .hero-time { font-size: 3.8rem; font-weight: 900; color: var(--text); letter-spacing: -2px; }
        .hero-version { font-size: 0.8rem; color: var(--accent); font-weight: 800; letter-spacing: 3px; margin-top: 8px; text-transform: uppercase; }

        .sensor-panel { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--smart); border-radius: 20px; padding: 15px; margin-bottom: 20px; }
        .sensor-status { font-size: 0.7rem; color: var(--smart); text-transform: uppercase; font-weight: bold; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .pulse { width: 8px; height: 8px; background: var(--smart); border-radius: 50%; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .screen { display: none; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
        .active { display: block !important; }
        .btn { display: block; width: 100%; padding: 22px; margin: 12px 0; background: var(--card); border: 1px solid #30363d; border-radius: 20px; color: #fff; font-size: 1rem; text-align: left; position: relative; cursor: pointer; box-sizing: border-box; }
        
        .btn-smart { border: 2px solid var(--smart) !important; background: rgba(0, 242, 255, 0.1) !important; }
        .smart-tag { position: absolute; top: -10px; right: 15px; background: var(--smart); color: #000; font-size: 0.65rem; font-weight: 900; padding: 2px 8px; border-radius: 8px; }

        .fps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-fps { padding: 15px; text-align: center; font-weight: 900; font-size: 1.2rem; }
        
        .card { background: var(--card); padding: 20px; border-radius: 24px; margin-top: 15px; border-left: 6px solid var(--accent); }
        .val { color: #ffff00; font-weight: 900; font-size: 1.4rem; }

        /* SIMULATORE CSS */
        .sim-box { background: #000; border-radius: 20px; overflow: hidden; margin-top: 15px; border: 1px solid #333; position: relative; }
        #preview-img { width: 100%; height: 180px; object-fit: cover; transition: 0.3s; filter: brightness(1) sepia(0); }
        .sim-controls { padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; background: var(--card); }
        .btn-sim { padding: 8px 2px; font-size: 0.65rem; font-weight: bold; border-radius: 8px; border: 1px solid #444; background: #0b0e14; color: #fff; cursor: pointer; text-align: center; }
        .btn-sim.active { background: var(--smart); color: #000; border-color: var(--smart); }
        .sim-label { grid-column: span 4; font-size: 0.6rem; color: var(--accent); text-transform: uppercase; margin-top: 5px; margin-left: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="hero-info">
    <div id="hero-date" style="font-size: 0.7rem; color: #8b949e; letter-spacing: 2px;">-- -- ----</div>
    <div class="hero-main">
        <div id="hero-time" class="hero-time">00:00</div>
        <div class="hero-version">v112 PRO-SIM</div>
    </div>
</div>

<div class="sensor-panel">
    <div class="sensor-status"><div class="pulse"></div> <span id="gps-label">ATTESA GPS / FOTO...</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn" onclick="getLocation()" style="margin:0; padding:12px; flex:1; text-align:center; background:var(--smart); color:#000; font-weight:bold; font-size:0.7rem;">🛰️ LOCALIZZA</button>
        <label class="btn" style="margin:0; padding:12px; flex:1; text-align:center; border-color:var(--smart); font-size:0.7rem; font-weight:bold;">
            📸 ANALISI FOTO
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="analyzeImage(event)">
        </label>
    </div>
</div>

<div id="screen-env" class="screen active">
    <h1 style="font-size:0.9rem; color:var(--accent);">1. AMBIENTE</h1>
    <button class="btn" id="btn-sole" onclick="next('env', 'Sole Forte', 'screen-fps')">☀️ SOLE PIENO / ZENIT</button>
    <button class="btn" id="btn-taglio" onclick="next('env', 'Luce di Taglio', 'screen-fps')">📐 MATTINA / POMERIGGIO</button>
    <button class="btn" id="btn-alba" onclick="next('env', 'Alba/Tramonto', 'screen-fps')">🌅 ALBA / TRAMONTO</button>
    <button class="btn" id="btn-nuvoloso" onclick="next('env', 'Nuvoloso', 'screen-fps')">☁️ NUVOLOSO / OMBRA</button>
    <button class="btn" id="btn-notte" onclick="next('env', 'Notte', 'screen-fps')">🌙 NOTTE / CITTÀ</button>
</div>

<div id="screen-fps" class="screen">
    <h1 style="font-size:0.9rem; color:var(--accent);">2. FPS</h1>
    <div class="fps-grid">
        <button class="btn btn-fps" id="fps-24" onclick="next('fps', '24', 'screen-res')">24</button>
        <button class="btn btn-fps" id="fps-25" onclick="next('fps', '25', 'screen-res')">25</button>
        <button class="btn btn-fps" id="fps-30" onclick="next('fps', '30', 'screen-res')">30</button>
    </div>
</div>

<div id="screen-res" class="screen">
    <div id="result"></div>
    
    <div class="sim-box">
        <img id="preview-img" src="https://images.unsplash.com/photo-1473448912268-2022ce9509d8?auto=format&fit=crop&w=800&q=80" alt="Preview">
        <div class="sim-controls">
            <div class="sim-label">Simulazione Filtro ND</div>
            <button class="btn-sim" onclick="simND(1, this)">OFF</button>
            <button class="btn-sim" onclick="simND(0.5, this)">ND16</button>
            <button class="btn-sim" onclick="simND(0.2, this)">ND64</button>
            <button class="btn-sim" onclick="simND(0.1, this)">ND128</button>
            
            <div class="sim-label">Simulazione Bilanciamento Bianco (Kelvin)</div>
            <button class="btn-sim" onclick="simWB(3200, this)">3200K</button>
            <button class="btn-sim" onclick="simWB(5500, this)">5500K</button>
            <button class="btn-sim" onclick="simWB(6500, this)">6500K</button>
            <button class="btn-sim" onclick="simWB(8000, this)">8000K</button>
        </div>
    </div>

    <button class="btn" onclick="location.reload()" style="background:var(--accent); color:#000; text-align:center; font-weight:bold; margin-top:20px;">🔄 RESET</button>
</div>

<script>
    let state = { lat: 41.9, sunAlt: null, currentB: 1, currentS: 0 };

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                state.lat = pos.coords.latitude;
                calculateSun();
            });
        }
    }

    function analyzeImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('gps-label').innerText = "FOTO CARICATA PER PREVIEW";
            };
            reader.readAsDataURL(file);
        }
    }

    function calculateSun() {
        const now = new Date();
        const start = new Date(now.getFullYear(), 0, 0);
        const day = Math.floor((now - start) / 86400000);
        const decl = 23.45 * Math.sin((360 / 365) * (day - 81) * (Math.PI / 180));
        const hour = now.getHours() + now.getMinutes() / 60;
        const h = (hour - 12) * 15;
        const alt = Math.asin(Math.sin(state.lat * Math.PI / 180) * Math.sin(decl * Math.PI / 180) + Math.cos(state.lat * Math.PI / 180) * Math.cos(decl * Math.PI / 180) * Math.cos(h * Math.PI / 180)) * 180 / Math.PI;
        state.sunAlt = alt;
        document.getElementById('gps-label').innerText = `SOLE: ${Math.round(alt)}° | LAT: ${state.lat.toFixed(1)}`;
        updateSmart();
    }

    function simND(val, btn) {
        state.currentB = val;
        applyFilters();
        setActive(btn);
    }

    function simWB(k, btn) {
        // Logica semplificata: < 5000 caldo (sepia), > 5500 freddo (blue)
        if(k < 5000) state.currentS = 0.5;
        else if(k > 6000) state.currentS = -0.3;
        else state.currentS = 0;
        applyFilters();
        setActive(btn);
    }

    function applyFilters() {
        const img = document.getElementById('preview-img');
        const hue = state.currentS < 0 ? `hue-rotate(180deg) saturate(${Math.abs(state.currentS)*2})` : `sepia(${state.currentS})`;
        img.style.filter = `brightness(${state.currentB}) ${hue}`;
    }

    function setActive(btn) {
        const parent = btn.parentElement;
        parent.querySelectorAll('.btn-sim').forEach(b => {
            if(b.innerText === btn.innerText || (btn.innerText.includes('K') && b.innerText.includes('K'))) {
                // Questo check è un po' grezzo per dividere le due righe
            }
        });
        // Semplifichiamo: resetta tutti i vicini della stessa categoria
        btn.parentElement.querySelectorAll('.btn-sim').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function updateSmart() {
        document.querySelectorAll('.btn-smart').forEach(b => b.classList.remove('btn-smart'));
        document.querySelectorAll('.smart-tag').forEach(t => t.remove());
        if (state.sunAlt !== null) {
            if (state.sunAlt < -6) markSmart('btn-notte');
            else if (state.sunAlt >= -6 && state.sunAlt <= 12) markSmart('btn-alba');
            else if (state.sunAlt > 12 && state.sunAlt <= 35) markSmart('btn-taglio');
            else markSmart('btn-sole');
        }
        markSmart('fps-24');
    }

    function markSmart(id) {
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('btn-smart');
            const tag = document.createElement('div');
            tag.className = 'smart-tag';
            tag.innerText = 'SMART';
            el.appendChild(tag);
        }
    }

    function next(k, v, screenId) {
        state[k] = v;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
        if(screenId === 'screen-res') render();
    }

    function render() {
        let nd = (state.env === 'Sole Forte') ? "ND128" : (state.env === 'Luce di Taglio') ? "ND64" : "ND16";
        if(state.env === 'Notte') nd = "NESSUNO";
        
        document.getElementById('result').innerHTML = `
            <div class="card">
                <span style="font-size:0.7rem; color:#8b949e;">SETUP CONSIGLIATO</span><br>
                FILTRO: <span class="val">${nd}</span><br>
                OTTURATORE: <span class="val">1/${state.fps * 2}s</span>
            </div>`;
    }

    function tick() {
        const now = new Date();
        document.getElementById('hero-time').innerText = now.toLocaleTimeString('it-IT', {hour: '2-digit', minute:'2-digit'});
        document.getElementById('hero-date').innerText = now.toLocaleDateString('it-IT', {weekday:'long', day:'2-digit', month:'long'}).toUpperCase();
    }
    
    setInterval(tick, 1000);
    tick();
    updateSmart();
</script>

</body>
</html>
